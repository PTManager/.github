<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">PTManager 시스템 아키텍처</title>
  <desc id="desc">직원용 앱과 사장용 앱이 REST API와 JWT를 통해 백엔드에 연결되고, 백엔드는 데이터베이스, FCM 푸시, S3 파일 저장소를 사용합니다.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFF"/>
      <stop offset="1" stop-color="#EEF3FF"/>
    </linearGradient>
    <linearGradient id="backend" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3767E8"/>
      <stop offset="1" stop-color="#634BD8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#20366F" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1l10 5-10 5z" fill="#7181A8"/>
    </marker>
    <style>
      text { font-family: Pretendard, "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif; }
      .eyebrow { font-size: 16px; font-weight: 700; letter-spacing: 2px; fill: #5A70AA; }
      .heading { font-size: 32px; font-weight: 800; fill: #17213C; }
      .card-title { font-size: 23px; font-weight: 800; fill: #17213C; }
      .card-copy { font-size: 15px; font-weight: 500; fill: #697795; }
      .backend-title { font-size: 25px; font-weight: 800; fill: #FFFFFF; }
      .backend-copy { font-size: 15px; font-weight: 500; fill: #E7EBFF; }
      .chip { font-size: 13px; font-weight: 700; fill: #FFFFFF; }
      .flow { fill: none; stroke: #7181A8; stroke-width: 3; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="720" rx="28" fill="url(#background)"/>
  <text x="70" y="62" class="eyebrow">PTMANAGER</text>
  <text x="70" y="104" class="heading">System Architecture</text>
  <text x="1130" y="93" text-anchor="end" class="card-copy">하나의 백엔드 · 역할 기반 앱 분리</text>

  <path class="flow" d="M350 244 C350 282 500 275 545 325"/>
  <path class="flow" d="M850 244 C850 282 700 275 655 325"/>
  <rect x="522" y="256" width="156" height="34" rx="17" fill="#FFFFFF" stroke="#D8E0F5"/>
  <text x="600" y="278" text-anchor="middle" class="card-copy" style="font-size:13px;font-weight:700;fill:#4F649C">REST API · JWT</text>

  <g filter="url(#shadow)">
    <rect x="120" y="140" width="460" height="104" rx="20" fill="#FFFFFF"/>
    <rect x="120" y="140" width="8" height="104" rx="4" fill="#3DDC84"/>
    <circle cx="174" cy="192" r="28" fill="#E9FBF2"/>
    <path d="M160 202c2-11 8-17 14-17s12 6 14 17M174 181a8 8 0 1 0 0-16 8 8 0 0 0 0 16z" fill="none" stroke="#20A965" stroke-width="4" stroke-linecap="round"/>
    <text x="220" y="184" class="card-title">직원용 Android 앱</text>
    <text x="220" y="211" class="card-copy">Kotlin · View(XML) · Retrofit</text>

    <rect x="620" y="140" width="460" height="104" rx="20" fill="#FFFFFF"/>
    <rect x="620" y="140" width="8" height="104" rx="4" fill="#7F52FF"/>
    <circle cx="674" cy="192" r="28" fill="#F0EBFF"/>
    <path d="M660 202c2-11 8-17 14-17s12 6 14 17M674 181a8 8 0 1 0 0-16 8 8 0 0 0 0 16z" fill="none" stroke="#6D48DB" stroke-width="4" stroke-linecap="round"/>
    <text x="720" y="184" class="card-title">사장용 Android 앱</text>
    <text x="720" y="211" class="card-copy">Kotlin · View(XML) · Retrofit</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="290" y="326" width="620" height="146" rx="24" fill="url(#backend)"/>
    <text x="600" y="369" text-anchor="middle" class="backend-title">Backend API</text>
    <text x="600" y="397" text-anchor="middle" class="backend-copy">Spring Boot · Kotlin · Spring Security</text>
    <g transform="translate(346 420)">
      <rect width="75" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.16"/>
      <text x="37.5" y="19" text-anchor="middle" class="chip">Auth</text>
      <rect x="86" width="101" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.16"/>
      <text x="136.5" y="19" text-anchor="middle" class="chip">Workplace</text>
      <rect x="198" width="76" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.16"/>
      <text x="236" y="19" text-anchor="middle" class="chip">Shift</text>
      <rect x="285" width="93" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.16"/>
      <text x="331.5" y="19" text-anchor="middle" class="chip">Swap</text>
      <rect x="389" width="119" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.16"/>
      <text x="448.5" y="19" text-anchor="middle" class="chip">Notification</text>
    </g>
  </g>

  <path class="flow" d="M600 472V510H254V550"/>
  <path class="flow" d="M600 472V550"/>
  <path class="flow" d="M600 510H946V550"/>

  <g filter="url(#shadow)">
    <rect x="105" y="550" width="298" height="112" rx="20" fill="#FFFFFF"/>
    <circle cx="157" cy="606" r="25" fill="#EAF1FF"/>
    <ellipse cx="157" cy="596" rx="13" ry="6" fill="none" stroke="#4169E1" stroke-width="3"/>
    <path d="M144 596v20c0 4 6 7 13 7s13-3 13-7v-20M144 606c0 4 6 7 13 7s13-3 13-7" fill="none" stroke="#4169E1" stroke-width="3"/>
    <text x="198" y="600" class="card-title" style="font-size:19px">Database</text>
    <text x="198" y="626" class="card-copy">PostgreSQL · H2 · Flyway</text>

    <rect x="451" y="550" width="298" height="112" rx="20" fill="#FFFFFF" stroke="#C9D3EA" stroke-dasharray="7 6"/>
    <circle cx="503" cy="606" r="25" fill="#FFF1E6"/>
    <path d="M503 588c-9 0-14 7-14 16v7l-5 7h38l-5-7v-7c0-9-5-16-14-16zm-6 31c1 5 3 7 6 7s5-2 6-7" fill="none" stroke="#F57C00" stroke-width="3" stroke-linejoin="round"/>
    <text x="544" y="600" class="card-title" style="font-size:19px">FCM Push</text>
    <text x="544" y="626" class="card-copy">선택 활성화</text>

    <rect x="797" y="550" width="298" height="112" rx="20" fill="#FFFFFF" stroke="#C9D3EA" stroke-dasharray="7 6"/>
    <circle cx="849" cy="606" r="25" fill="#EAF8FF"/>
    <path d="M835 600h28v20h-28zM839 600l5-9h10l5 9" fill="none" stroke="#1683B8" stroke-width="3" stroke-linejoin="round"/>
    <text x="890" y="600" class="card-title" style="font-size:19px">S3 Storage</text>
    <text x="890" y="626" class="card-copy">선택 활성화</text>
  </g>
</svg>
